<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>Paraat</title>
<meta name="theme-color" content="#04161a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Paraat" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#04161a;
    --bg2:#072227;
    --panel:#0a2a30;
    --panel2:#0d343b;
    --line:#12454d;
    --cyan:#22d3ee;
    --cyan-dim:#0e7e8c;
    --green:#2ee06a;
    --green-glow:#39ff8e;
    --amber:#ffb454;
    --red:#ff5d6c;
    --text:#dff3f5;
    --muted:#6f9aa1;
    --grid: rgba(34,211,238,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      linear-gradient(0deg,var(--grid) 1px,transparent 1px) 0 0/100% 28px,
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/28px 100%,
      radial-gradient(120% 80% at 50% -10%, #0a2a30 0%, var(--bg) 60%);
    color:var(--text);
    font-family:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
    font-size:16px;line-height:1.5;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    overflow-x:hidden;
  }
  h1,h2,h3,.mono,.stat-num,.brand{font-family:"Space Grotesk",system-ui,sans-serif;}
  #app{max-width:560px;margin:0 auto;padding:0 16px 40px;}

  /* ===== top monitor bar ===== */
  .topbar{position:sticky;top:0;z-index:20;padding-top:10px;
    background:linear-gradient(180deg,var(--bg) 70%,transparent);}
  .monitor{
    display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:14px;
    padding:10px 14px;box-shadow:0 0 0 1px rgba(0,0,0,.3),0 10px 30px -18px #000;
  }
  .brand{font-weight:700;font-size:20px;letter-spacing:.06em;color:var(--cyan);
    text-shadow:0 0 14px rgba(34,211,238,.45);}
  .brand b{color:var(--green-glow);}
  .ecg{flex:1;height:34px;overflow:hidden;position:relative;border-radius:8px;}
  .ecg svg{position:absolute;left:0;top:0;height:100%;width:200%;}
  .ecg .trace{fill:none;stroke:var(--green-glow);stroke-width:2;
    filter:drop-shadow(0 0 5px var(--green));stroke-linejoin:round;stroke-linecap:round;}
  @keyframes sweep{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ecg svg{animation:sweep 4s linear infinite;}
  .bpm{font-family:"Space Grotesk";font-size:13px;color:var(--green-glow);
    text-align:right;line-height:1.05;}
  .bpm small{display:block;color:var(--muted);font-size:9px;letter-spacing:.12em;}

  /* ===== readout row ===== */
  .readout{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
  .cell{background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:12px;padding:10px 12px;position:relative;overflow:hidden;}
  .cell::before{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 60% at 0 0,rgba(34,211,238,.07),transparent 70%);}
  .cell .lbl{font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;}
  .cell .val{font-family:"Space Grotesk";font-weight:700;font-size:26px;line-height:1.1;margin-top:2px;}
  .cell.due .val{color:var(--cyan);text-shadow:0 0 12px rgba(34,211,238,.4);}
  .cell.new .val{color:var(--green-glow);text-shadow:0 0 12px rgba(46,224,106,.35);}
  .cell.streak .val{color:var(--amber);}

  /* ===== buttons ===== */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;
    font-weight:600;color:var(--text);background:var(--panel);cursor:pointer;width:100%;
    font-family:inherit;transition:transform .05s ease,background .15s;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:linear-gradient(180deg,#0e6b78,#0a4c55);
    border-color:var(--cyan-dim);color:#eafdff;box-shadow:0 0 22px -6px rgba(34,211,238,.5);}
  .btn.ghost{background:transparent;color:var(--muted);}

  .section-title{display:flex;align-items:center;gap:8px;margin:22px 2px 10px;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .section-title::after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,var(--line),transparent);}

  /* ===== set list ===== */
  .set{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;
    color:inherit;font-family:inherit;transition:border-color .15s,transform .05s;}
  .set:active{transform:scale(.99);}
  .set:hover{border-color:var(--cyan-dim);}
  .set .dot{width:10px;height:10px;border-radius:50%;flex:none;
    box-shadow:0 0 10px currentColor;}
  .set .meta{flex:1;min-width:0;}
  .set .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .set .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .pill{font-family:"Space Grotesk";font-weight:700;font-size:13px;padding:3px 9px;border-radius:999px;
    border:1px solid var(--line);}
  .pill.due{color:var(--cyan);border-color:var(--cyan-dim);}
  .pill.new{color:var(--green-glow);border-color:#1c6b3e;}
  .bar{height:5px;border-radius:3px;background:var(--line);margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));}

  /* ===== study card ===== */
  .study{padding-top:8px;}
  .crumbs{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;
    margin:4px 2px 12px;display:flex;justify-content:space-between;gap:10px;}
  .crumbs b{color:var(--cyan);}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
    border-radius:18px;padding:22px 20px;min-height:46vh;display:flex;flex-direction:column;
    position:relative;overflow:hidden;box-shadow:0 18px 50px -30px #000;}
  .card::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5;}
  .q{font-size:21px;font-weight:500;white-space:pre-wrap;word-wrap:break-word;}
  .q .blank{color:var(--cyan);font-weight:700;text-shadow:0 0 10px rgba(34,211,238,.5);}
  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:18px 0;}
  .a{font-size:19px;color:var(--green-glow);white-space:pre-wrap;word-wrap:break-word;
    text-shadow:0 0 12px rgba(46,224,106,.22);}
  .extra{margin-top:14px;font-size:14px;color:var(--muted);white-space:pre-wrap;}
  .tags{margin-top:auto;padding-top:16px;display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-size:10px;letter-spacing:.08em;color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:2px 7px;text-transform:uppercase;}

  .reveal-wrap{margin-top:16px;}
  .grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
  .grade{border:1px solid var(--line);border-radius:12px;padding:12px 4px;cursor:pointer;
    background:var(--panel);color:var(--text);font-family:inherit;text-align:center;transition:transform .05s;}
  .grade:active{transform:scale(.95);}
  .grade .g{font-family:"Space Grotesk";font-weight:700;font-size:15px;}
  .grade .t{font-size:10px;color:var(--muted);margin-top:2px;}
  .grade.again{border-color:#7a2b33;} .grade.again .g{color:var(--red);}
  .grade.hard{border-color:#7a5a22;} .grade.hard .g{color:var(--amber);}
  .grade.good{border-color:#1c6b3e;} .grade.good .g{color:var(--green-glow);}
  .grade.easy{border-color:var(--cyan-dim);} .grade.easy .g{color:var(--cyan);}

  .progress-line{height:4px;border-radius:2px;background:var(--line);margin:12px 0 16px;overflow:hidden;}
  .progress-line i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .3s;}

  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .big{font-family:"Space Grotesk";font-size:46px;color:var(--green-glow);
    text-shadow:0 0 20px rgba(46,224,106,.4);}
  .flatline{height:2px;background:var(--green);margin:18px auto;width:60%;opacity:.6;
    box-shadow:0 0 10px var(--green);}

  .row{display:flex;gap:10px;}
  .row .btn{flex:1;}
  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:14px;}
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:30px;letter-spacing:.1em;}
  .footer a{color:var(--cyan-dim);text-decoration:none;}
  .hidden{display:none!important;}
  .toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:10px 16px;border-radius:10px;
    font-size:13px;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script src="app.js?v=2"></script>
</body>
</html>
